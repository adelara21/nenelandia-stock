name: Stock unificado Gesio

# Cuando se ejecuta:
on:
  schedule:
    # IMPORTANTE: la hora es UTC. 21:00 UTC = 23:00 Espana (verano, CEST) / 22:00 (invierno, CET).
    # Gesio actualiza el stock por la noche; esto corre antes para dejarle el fichero listo.
    # GitHub puede retrasar el arranque ~15 min en horas pico.
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # boton para lanzarlo a mano desde la pestana Actions

permissions:
  contents: write          # necesario para guardar los maestros y el stock.csv

# Evita que dos ejecuciones se pisen
concurrency:
  group: stock
  cancel-in-progress: false

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install xlrd   # para leer los .xls del FTP de Cambrass

      - name: Generar el stock unificado
        env:
          BIMBI_FEED_URL: ${{ secrets.BIMBI_FEED_URL }}
          CAMBRASS_FEED_URL: ${{ secrets.CAMBRASS_FEED_URL }}
          CAMBRASS_FTP_HOST: ${{ secrets.CAMBRASS_FTP_HOST }}
          CAMBRASS_FTP_USER: ${{ secrets.CAMBRASS_FTP_USER }}
          CAMBRASS_FTP_PASS: ${{ secrets.CAMBRASS_FTP_PASS }}
        run: python stock_unificado.py

      - name: Publicar el resultado
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add masters docs/stock.csv
          git commit -m "stock $(date -u +%Y-%m-%d)" || echo "Sin cambios que publicar"
          git push
